<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dial Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><rect width=%2224%22 height=%2224%22 rx=%225%22 fill=%22%23185FA5%22/><path d=%22M7 8c0-1 1-2 2-2h1l1 3-1.5 1.5c1 2 2.5 3.5 4.5 4.5L15.5 13l3 1v1c0 1-1 2-2 2-6 0-9.5-3.5-9.5-9.5z%22 fill=%22white%22/></svg>">
<style>
  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --surface-muted: #F1EFE8;
    --border: rgba(44,44,42,0.12);
    --border-strong: rgba(44,44,42,0.25);
    --text-primary: #1F1F1D;
    --text-secondary: #5F5E5A;
    --text-tertiary: #8B8A84;
    --accent: #185FA5;
    --accent-light: #E6F1FB;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1A18;
      --surface: #242422;
      --surface-muted: #2C2C2A;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.22);
      --text-primary: #F1EFE8;
      --text-secondary: #B4B2A9;
      --text-tertiary: #888780;
      --accent: #85B7EB;
      --accent-light: #0C447C;
      --green: #97C459;
      --green-light: #27500A;
      --coral: #F0997B;
      --coral-light: #4A1B0C;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }
  .header-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .header-row h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0;
  }
  .date-label {
    font-size: 13px;
    color: var(--text-tertiary);
    margin: 2px 0 0;
  }
  .undo-btn {
    font-size: 13px;
    padding: 7px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
  }
  .undo-btn:hover { background: var(--surface-muted); }
  .undo-btn:disabled { opacity: 0.4; cursor: default; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface-muted);
    border-radius: var(--radius-md);
    padding: 14px 10px;
    text-align: center;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin: 0 0 4px;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.5px;
    cursor: text;
    border-radius: 6px;
    padding: 2px 4px;
  }
  .stat-value:hover {
    background: var(--surface);
    box-shadow: 0 0 0 1px var(--border-strong);
  }
  .stat-value:focus {
    outline: none;
    background: var(--surface);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .stat-hint {
    font-size: 10.5px;
    color: var(--text-tertiary);
    margin: 6px 0 0;
  }

  .btn-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }
  .action-btn {
    height: 64px;
    border-radius: var(--radius-lg);
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: transform 0.08s ease;
    color: white;
  }
  .action-btn:active { transform: scale(0.95); }
  .action-btn svg { width: 20px; height: 20px; }
  .btn-dial { background: var(--accent); }
  .btn-connect { background: var(--green); }
  .btn-booked { background: var(--coral); }

  .week-section {
    border-top: 0.5px solid var(--border);
    padding-top: 1.25rem;
  }
  .week-title {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 12px;
  }
  .day-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .day-label {
    font-size: 13px;
    width: 36px;
    flex-shrink: 0;
  }
  .day-bar-track {
    flex: 1;
    height: 6px;
    background: var(--surface-muted);
    border-radius: 3px;
    overflow: hidden;
  }
  .day-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
  }
  .day-counts {
    font-size: 12.5px;
    width: 100px;
    text-align: right;
    color: var(--text-secondary);
    flex-shrink: 0;
  }
  .rates-row {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 0.5px solid var(--border);
    font-size: 13px;
    color: var(--text-secondary);
  }
  .rates-row b { color: var(--text-primary); font-weight: 600; }

  .footer-note {
    margin-top: 2rem;
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header-row">
    <div>
      <h1>Dial tracker</h1>
      <p class="date-label" id="date-label"></p>
    </div>
    <button class="undo-btn" id="undo-btn" disabled>Undo last</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <p class="stat-label">Dials</p>
      <p class="stat-value" id="dials-count" contenteditable="true" inputmode="numeric" data-field="dials">0</p>
      <p class="stat-hint">tap to edit</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Connects</p>
      <p class="stat-value" id="connects-count" contenteditable="true" inputmode="numeric" data-field="connects">0</p>
      <p class="stat-hint">tap to edit</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Booked</p>
      <p class="stat-value" id="bookings-count" contenteditable="true" inputmode="numeric" data-field="bookings">0</p>
      <p class="stat-hint">tap to edit</p>
    </div>
  </div>

  <div class="btn-grid">
    <button class="action-btn btn-dial" id="dial-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      Dial
    </button>
    <button class="action-btn btn-connect" id="connect-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/><path d="M16 8l2 2 4-4" stroke="white"/></svg>
      Connect
    </button>
    <button class="action-btn btn-booked" id="booking-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M9 16l2 2 4-4"/></svg>
      Booked
    </button>
  </div>

  <div class="week-section">
    <p class="week-title">This week</p>
    <div id="week-rows"></div>
    <div class="rates-row">
      <span>Connect rate: <b id="connect-rate">—</b></span>
      <span>Booking rate: <b id="booking-rate">—</b></span>
    </div>
  </div>

</div>

<script>
(function(){
  const STORAGE_KEY = 'dial_tracker_log_v1';
  let log = {};
  let lastAction = null;
  let activeEditField = null;

  function todayKey(d){
    d = d || new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function ensureDay(key){
    if(!log[key]) log[key] = {dials:0, connects:0, bookings:0};
    return log[key];
  }

  function load(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      log = raw ? JSON.parse(raw) : {};
    } catch(e) {
      log = {};
    }
  }

  function save(){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(log));
    } catch(e) {
      console.error('save failed', e);
    }
  }

  function dateLabel(){
    document.getElementById('date-label').textContent =
      new Date().toLocaleDateString(undefined, {weekday:'long', month:'short', day:'numeric'});
  }

  function weekDates(){
    const days = [];
    const now = new Date();
    const dow = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - ((dow + 6) % 7));
    for(let i=0;i<7;i++){
      const d = new Date(monday);
      d.setDate(monday.getDate()+i);
      days.push(d);
    }
    return days;
  }

  function render(){
    dateLabel();
    const tKey = todayKey();
    const today = ensureDay(tKey);
    if(activeEditField !== 'dials') document.getElementById('dials-count').textContent = today.dials;
    if(activeEditField !== 'connects') document.getElementById('connects-count').textContent = today.connects;
    if(activeEditField !== 'bookings') document.getElementById('bookings-count').textContent = today.bookings;
    document.getElementById('undo-btn').disabled = !lastAction;

    const rowsEl = document.getElementById('week-rows');
    rowsEl.innerHTML = '';
    const days = weekDates();
    let weekDials = 0, weekConnects = 0, weekBookings = 0;
    const now = new Date();

    days.forEach(d => {
      const key = todayKey(d);
      const entry = log[key] || {dials:0, connects:0, bookings:0};
      weekDials += entry.dials;
      weekConnects += entry.connects;
      weekBookings += entry.bookings;
      const isToday = key === tKey;
      const isFuture = d > now && !isToday;
      const label = d.toLocaleDateString(undefined, {weekday:'short'});

      const row = document.createElement('div');
      row.className = 'day-row';
      row.style.opacity = isFuture ? '0.4' : '1';
      row.innerHTML =
        '<span class="day-label" style="color:' + (isToday ? 'var(--text-primary)' : 'var(--text-secondary)') + '; font-weight:' + (isToday ? '600' : '400') + ';">' + label + '</span>' +
        '<div class="day-bar-track"><div class="day-bar-fill" style="width:' + Math.min(100, entry.dials * 2) + '%;"></div></div>' +
        '<span class="day-counts">' + entry.dials + 'd · ' + entry.connects + 'c · ' + entry.bookings + 'b</span>';
      rowsEl.appendChild(row);
    });

    const connRate = weekDials > 0 ? Math.round((weekConnects / weekDials) * 100) : null;
    const bookRate = weekConnects > 0 ? Math.round((weekBookings / weekConnects) * 100) : null;
    document.getElementById('connect-rate').textContent = connRate !== null ? connRate + '%' : '—';
    document.getElementById('booking-rate').textContent = bookRate !== null ? bookRate + '%' : '—';
  }

  function bump(field, btnEl){
    const key = todayKey();
    const day = ensureDay(key);
    day[field] += 1;
    lastAction = { key, field };
    save();
    render();
  }

  function setupEditableStat(el){
    const field = el.dataset.field;

    el.addEventListener('focus', function(){
      activeEditField = field;
      // select all text so typing replaces it
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });

    el.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){
        e.preventDefault();
        el.blur();
      }
      // allow digits, backspace, delete, arrows, tab; block everything else
      const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Enter'];
      if(!allowed.includes(e.key) && !/^[0-9]$/.test(e.key)){
        e.preventDefault();
      }
    });

    el.addEventListener('paste', function(e){
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      const digits = text.replace(/[^0-9]/g, '');
      document.execCommand('insertText', false, digits);
    });

    el.addEventListener('blur', function(){
      const key = todayKey();
      const day = ensureDay(key);
      let val = parseInt(el.textContent.replace(/[^0-9]/g, ''), 10);
      if(isNaN(val) || val < 0) val = 0;
      day[field] = val;
      activeEditField = null;
      save();
      render();
    });
  }

  setupEditableStat(document.getElementById('dials-count'));
  setupEditableStat(document.getElementById('connects-count'));
  setupEditableStat(document.getElementById('bookings-count'));

  document.getElementById('dial-btn').addEventListener('click', function(){ bump('dials', this); });
  document.getElementById('connect-btn').addEventListener('click', function(){ bump('connects', this); });
  document.getElementById('booking-btn').addEventListener('click', function(){ bump('bookings', this); });

  document.getElementById('undo-btn').addEventListener('click', function(){
    if(!lastAction) return;
    const day = ensureDay(lastAction.key);
    if(day[lastAction.field] > 0) day[lastAction.field] -= 1;
    lastAction = null;
    save();
    render();
  });

  load();
  render();
})();
</script>
</body>
</html>
